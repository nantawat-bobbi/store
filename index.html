<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MarketBrain: Salmon Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #0f172a; color: white; }
        .category-pill { transition: 0.3s; white-space: nowrap; }
        .category-pill.active { background: #ef4444; color: white; box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4); }
        .item-card { background: #1e293b; border-radius: 24px; border: 1px solid #334155; }
        .numpad-btn { background: #334155; height: 60px; border-radius: 16px; font-size: 1.5rem; font-weight: bold; }
        .numpad-btn:active { background: #ef4444; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="bg-slate-900 p-4 pt-8 shrink-0">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-red-500"><i class="fas fa-fish mr-2"></i>Salmon<span class="text-white">Log</span></h1>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 uppercase">งบวันนี้</p>
                <p id="total" class="text-xl font-bold text-green-400">฿ 0</p>
            </div>
        </div>
        
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
            <button onclick="filterCat('all')" class="category-pill active px-6 py-2 rounded-full bg-slate-800 text-sm font-bold">ทั้งหมด</button>
            <button onclick="filterCat('seafood')" class="category-pill px-6 py-2 rounded-full bg-slate-800 text-sm font-bold">ของสด/ปลา</button>
            <button onclick="filterCat('veg')" class="category-pill px-6 py-2 rounded-full bg-slate-800 text-sm font-bold">ผัก/เครื่องเคียง</button>
            <button onclick="filterCat('dry')" class="category-pill px-6 py-2 rounded-full bg-slate-800 text-sm font-bold">ของแห้ง/ซอส</button>
        </div>
    </header>

    <main id="list-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-40">
        </main>

    <div id="calc-overlay" class="fixed inset-0 bg-slate-900/98 z-[100] hidden flex flex-col p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 id="target-name" class="text-2xl font-bold">แซลมอนนอร์เวย์</h2>
            <button onclick="closeCalc(true)" class="bg-red-600 px-10 py-3 rounded-2xl font-bold text-xl">บันทึก</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">ราคาที่ต่อได้</p>
                <div id="num-display" class="text-3xl font-bold text-red-500">0</div>
            </div>
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">เทียบร้านอื่น</p>
                <p id="compare-info" class="text-sm text-slate-300">ลุงมี: ฿450</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 flex-1 mb-6">
            <button onclick="press('7')" class="numpad-btn">7</button>
            <button onclick="press('8')" class="numpad-btn">8</button>
            <button onclick="press('9')" class="numpad-btn">9</button>
            <button onclick="press('4')" class="numpad-btn">4</button>
            <button onclick="press('5')" class="numpad-btn">5</button>
            <button onclick="press('6')" class="numpad-btn">6</button>
            <button onclick="press('1')" class="numpad-btn">1</button>
            <button onclick="press('2')" class="numpad-btn">2</button>
            <button onclick="press('3')" class="numpad-btn">3</button>
            <button onclick="press('C')" class="numpad-btn text-red-500">C</button>
            <button onclick="press('0')" class="numpad-btn">0</button>
            <button onclick="closeCalc(false)" class="numpad-btn text-slate-500"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <script>
        let currentCat = 'all';
        const products = [
            { id: 1, cat: 'seafood', name: 'แซลมอน (Trim C)', qty: '5 ตัว', prev: 420, shop: 'เจ๊หงส์', now: 0 },
            { id: 2, cat: 'seafood', name: 'ทูน่า Saku', qty: '2 กก.', prev: 850, shop: 'Interfish', now: 0 },
            { id: 3, cat: 'veg', name: 'หัวไชเท้า (ขูด)', qty: '10 กก.', prev: 25, shop: 'ตลาดไท', now: 0 },
            { id: 4, cat: 'veg', name: 'โชยุ (แกลลอน)', qty: '2 ถัง', prev: 550, shop: 'Makro', now: 0 },
            { id: 5, cat: 'dry', name: 'ข้าวญี่ปุ่น (A)', qty: '2 กระสอบ', prev: 1200, shop: 'ร้านเฮียตง', now: 0 }
        ];

        let activeIdx = null;
        let tempVal = "";

        function filterCat(cat) {
            currentCat = cat;
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(cat === 'all' ? 'ทั้งหมด' : (cat === 'seafood' ? 'ของสด' : cat === 'veg' ? 'ผัก' : 'ของแห้ง'))) btn.classList.add('active');
            });
            render();
        }

        function render() {
            const container = document.getElementById('list-container');
            const filtered = currentCat === 'all' ? products : products.filter(p => p.cat === currentCat);
            
            container.innerHTML = filtered.map((p, idx) => `
                <div onclick="openCalc(${p.id})" class="item-card p-5 flex justify-between items-center active:scale-95 transition-transform ${p.now > 0 ? 'border-green-500/50' : ''}">
                    <div>
                        <h3 class="text-lg font-bold">${p.name}</h3>
                        <p class="text-xs text-slate-400">เป้าหมาย: ${p.qty} | เดิม ฿${p.prev} (${p.shop})</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-bold ${p.now > 0 ? 'text-green-400' : 'text-slate-600'}">฿ ${p.now || '???'}</p>
                        ${p.now > 0 ? `<span class="text-[10px] ${p.now <= p.prev ? 'text-green-400' : 'text-red-400'}">${p.now <= p.prev ? '✓ ถูกกว่าเดิม' : '⚠ แพงขึ้น!'}</span>` : ''}
                    </div>
                </div>
            `).join('');
            
            const total = products.reduce((s, i) => s + (i.now || 0), 0);
            document.getElementById('total').innerText = `฿ ${total.toLocaleString()}`;
        }

        function openCalc(id) {
            const item = products.find(p => p.id === id);
            activeIdx = products.indexOf(item);
            tempVal = "";
            document.getElementById('target-name').innerText = item.name;
            document.getElementById('compare-info').innerText = `${item.shop} ล่าสุด: ฿${item.prev}`;
            document.getElementById('num-display').innerText = "0";
            document.getElementById('calc-overlay').classList.remove('hidden');
        }

        function press(key) {
            if(key === 'C') tempVal = "";
            else tempVal += key;
            document.getElementById('num-display').innerText = tempVal || "0";
        }

        function closeCalc(save) {
            if(save) products[activeIdx].now = parseInt(tempVal) || 0;
            document.getElementById('calc-overlay').classList.add('hidden');
            render();
        }

        render();
    </script>
</body>
</html>
