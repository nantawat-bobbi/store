<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Market v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; overflow: hidden; height: 100vh; background: #1a1c1e; }
        /* การ์ดใหญ่ๆ ให้กดง่าย */
        .item-btn { height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-radius: 20px; background: #2d2f31; margin-bottom: 10px; transition: 0.1s; }
        .item-btn:active { transform: scale(0.95); background: #3d3f41; }
        .item-btn.bought { background: #059669; border: 2px solid #10b981; }
        .numpad-btn { background: #3d3f41; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: white; }
        .numpad-btn:active { background: #4f46e5; }
    </style>
</head>
<body class="flex flex-col text-white">

    <div class="p-6 bg-indigo-600 rounded-b-[40px] shadow-xl">
        <p class="text-indigo-200 text-sm">ยอดจ่ายจริงตอนนี้</p>
        <h1 id="display-total" class="text-4xl font-bold">฿ 0</h1>
    </div>

    <main class="flex-1 overflow-y-auto p-4 space-y-2">
        <div id="list-container">
            <div class="item-btn" onclick="focusItem(this, 'อกไก่', 1)">
                <div>
                    <div class="text-xl font-bold">อกไก่</div>
                    <div class="text-sm text-gray-400">สั่งไว้ 10 กก.</div>
                </div>
                <div class="text-right">
                    <div class="item-price text-xl font-bold">฿ 0</div>
                </div>
            </div>
        </div>
    </main>

    <div id="calculator" class="bg-gray-800 p-4 rounded-t-[30px] hidden shadow-2xl border-t border-gray-700">
        <div class="flex justify-between items-center mb-4">
            <span id="target-name" class="text-lg font-bold text-indigo-400">กำลังใส่ราคา...</span>
            <button onclick="closeCalc(true)" class="bg-green-600 px-6 py-2 rounded-xl font-bold">เสร็จ</button>
        </div>
        <div class="grid grid-cols-3 gap-2">
            <div class="numpad-btn" onclick="press('1')">1</div>
            <div class="numpad-btn" onclick="press('2')">2</div>
            <div class="numpad-btn" onclick="press('3')">3</div>
            <div class="numpad-btn" onclick="press('4')">4</div>
            <div class="numpad-btn" onclick="press('5')">5</div>
            <div class="numpad-btn" onclick="press('6')">6</div>
            <div class="numpad-btn" onclick="press('7')">7</div>
            <div class="numpad-btn" onclick="press('8')">8</div>
            <div class="numpad-btn" onclick="press('9')">9</div>
            <div class="numpad-btn text-red-400" onclick="press('C')">C</div>
            <div class="numpad-btn" onclick="press('0')">0</div>
            <div class="numpad-btn" onclick="closeCalc(false)">✕</div>
        </div>
    </div>

    <script>
        let currentItem = null;
        let tempValue = "";
        const data = [
            { name: 'อกไก่', qty: '10 กก.' },
            { name: 'หมูสับ', qty: '5 กก.' },
            { name: 'ไข่เบอร์ 2', qty: '10 แผง' },
            { name: 'ผักบุ้ง', qty: '20 กำ' }
        ];

        function render() {
            const container = document.getElementById('list-container');
            container.innerHTML = data.map((item, idx) => `
                <div id="item-${idx}" class="item-btn ${item.price > 0 ? 'bought' : ''}" onclick="focusItem(${idx})">
                    <div>
                        <div class="text-xl font-bold">${item.name}</div>
                        <div class="text-sm ${item.price > 0 ? 'text-indigo-100' : 'text-gray-400'}">${item.qty}</div>
                    </div>
                    <div class="text-right text-xl font-bold">
                        ฿ ${item.price || 0}
                    </div>
                </div>
            `).join('');
        }

        function focusItem(idx) {
            currentItem = idx;
            tempValue = "";
            document.getElementById('target-name').innerText = "ใส่ราคา: " + data[idx].name;
            document.getElementById('calculator').classList.remove('hidden');
        }

        function press(num) {
            if (num === 'C') {
                tempValue = "";
            } else {
                tempValue += num;
            }
            document.getElementById('display-total').innerText = "฿ " + (tempValue || "0");
        }

        function closeCalc(save) {
            if (save && currentItem !== null) {
                data[currentItem].price = parseInt(tempValue) || 0;
            }
            document.getElementById('calculator').classList.add('hidden');
            render();
            updateGrandTotal();
        }

        function updateGrandTotal() {
            const total = data.reduce((sum, i) => sum + (i.price || 0), 0);
            document.getElementById('display-total').innerText = "฿ " + total.toLocaleString();
        }

        data.forEach(i => i.price = 0);
        render();
    </script>
</body>
</html>
