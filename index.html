<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARKET INTELLIGENCE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', 'Sarabun', sans-serif; background: var(--bg); color: white; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .step-indicator { height: 4px; border-radius: 10px; flex: 1; background: rgba(255,255,255,0.1); transition: 0.5s; }
        .step-indicator.active { background: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .item-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; transition: 0.3s; }
        .item-card:active { transform: translateY(2px); background: #2d3a4f; }
        .numpad-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; font-size: 1.5rem; transition: 0.2s; }
        .numpad-btn:active { background: var(--primary); color: white; }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 pt-10 sticky top-0 z-50 glass rounded-b-[2.5rem]">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xs uppercase tracking-[0.2em] text-slate-400 font-bold">Market Intelligence</h1>
                <h2 class="text-2xl font-bold gradient-text">OPERATIONS</h2>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-slate-500 block uppercase">Efficiency Score</span>
                <span class="text-xl font-bold text-green-400">94%</span>
            </div>
        </div>

        <div class="flex gap-2 mb-2">
            <div class="step-indicator active" id="dot-1"></div>
            <div class="step-indicator" id="dot-2"></div>
            <div class="step-indicator" id="dot-3"></div>
            <div class="step-indicator" id="dot-4"></div>
            <div class="step-indicator" id="dot-5"></div>
        </div>
        <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase tracking-tighter">
            <span>Simulate</span><span>Select</span><span>Budget</span><span>Route</span><span>Execution</span>
        </div>
    </header>

    <main class="p-6 space-y-6">
        <div id="panel-container">
            <div id="panel-content" class="space-y-4">
                </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full glass p-6 flex justify-between items-center rounded-t-[2.5rem] z-50">
        <button onclick="prevStep()" class="w-12 h-12 rounded-full flex items-center justify-center text-slate-400 border border-slate-700">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div class="text-center">
            <p id="step-name" class="text-xs font-bold text-slate-500 uppercase">Step 1: Simulation</p>
            <p id="step-desc" class="text-sm font-semibold">ตรวจสอบความพร้อม</p>
        </div>
        <button onclick="nextStep()" class="w-12 h-12 rounded-full bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-500/30">
            <i class="fas fa-chevron-right"></i>
        </button>
    </nav>

    <div id="calc-modal" class="fixed inset-0 z-[100] bg-slate-950/90 backdrop-blur-xl hidden p-8 flex flex-col justify-end">
        <div class="mb-auto pt-10 text-center">
            <h3 id="calc-title" class="text-slate-400 uppercase tracking-widest text-sm mb-2">ปลาแซลมอน นอร์เวย์</h3>
            <div class="flex justify-center items-center gap-4 mb-4">
                <div class="text-slate-500 line-through text-xl">฿450</div>
                <div class="text-6xl font-bold text-white tracking-tighter" id="calc-val">0</div>
            </div>
            <div id="alert-pill" class="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-red-500/20 text-red-400 text-xs font-bold hidden animate-bounce">
                <i class="fas fa-arrow-trend-up"></i> สูงกว่าราคาเป้าหมาย
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-10">
            <button onclick="n('7')" class="numpad-btn py-6">7</button>
            <button onclick="n('8')" class="numpad-btn py-6">8</button>
            <button onclick="n('9')" class="numpad-btn py-6">9</button>
            <button onclick="n('4')" class="numpad-btn py-6">4</button>
            <button onclick="n('5')" class="numpad-btn py-6">5</button>
            <button onclick="n('6')" class="numpad-btn py-6">6</button>
            <button onclick="n('1')" class="numpad-btn py-6">1</button>
            <button onclick="n('2')" class="numpad-btn py-6">2</button>
            <button onclick="n('3')" class="numpad-btn py-6">3</button>
            <button onclick="n('C')" class="numpad-btn py-6 text-red-400 text-sm">CLEAR</button>
            <button onclick="n('0')" class="numpad-btn py-6">0</button>
            <button onclick="confirmPrice()" class="numpad-btn py-6 bg-indigo-600 text-white"><i class="fas fa-check"></i></button>
        </div>
        <button onclick="closeCalc()" class="text-slate-500 text-xs uppercase tracking-widest font-bold">Cancel</button>
    </div>

    <script>
        let currentStep = 1;
        let db = [
            { id: 1, name: 'แซลมอน (Trim C)', prev: 450, shop: 'เจ๊แดง', order: 1, selected: true, now: 0 },
            { id: 2, name: 'หัวไชเท้าขูด', prev: 25, shop: 'ตลาดไท', order: 3, selected: true, now: 0 },
            { id: 3, name: 'โชยุญี่ปุ่น', prev: 520, shop: 'Makro', order: 2, selected: false, now: 0 }
        ];
        let val = "";

        function render() {
            const content = document.getElementById('panel-content');
            const stepName = document.getElementById('step-name');
            const stepDesc = document.getElementById('step-desc');
            
            // Update Indicators
            document.querySelectorAll('.step-indicator').forEach((dot, i) => {
                dot.className = `step-indicator ${i < currentStep ? 'active' : ''}`;
            });

            if (currentStep === 1) {
                stepName.innerText = "Step 1: Simulation";
                stepDesc.innerText = "วิเคราะห์คลังสินค้าหลัก";
                content.innerHTML = db.map(i => `
                    <div class="item-card p-5 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-slate-500 font-bold uppercase">${i.shop}</p>
                            <h4 class="font-bold text-lg">${i.name}</h4>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-500">LAST PRICE</p>
                            <p class="font-bold text-indigo-400">฿${i.prev}</p>
                        </div>
                    </div>
                `).join('');
            } else if (currentStep === 5) {
                stepName.innerText = "Step 5: Execution";
                stepDesc.innerText = "กำลังดำเนินการจัดซื้อ";
                content.innerHTML = db.filter(i => i.selected).map(i => `
                    <div onclick="openCalc(${i.id})" class="item-card p-6 flex justify-between items-center border-l-4 ${i.now > 0 ? (i.now > i.prev ? 'border-red-500' : 'border-green-500') : 'border-indigo-500'}">
                        <div class="flex-1">
                            <h4 class="font-bold text-xl">${i.name}</h4>
                            <p class="text-xs text-slate-500 uppercase mt-1">Target: ฿${i.prev} | Shop: ${i.shop}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-bold ${i.now > 0 ? 'text-white' : 'text-slate-700'} tracking-tighter">${i.now > 0 ? '฿'+i.now : '---'}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                content.innerHTML = `<div class="text-center py-20 text-slate-600 italic">หน้าจอส่วนนี้อยู่ระหว่างการปรับจูนความสวยงาม...</div>`;
            }
        }

        let activeId = null;
        function openCalc(id) {
            activeId = id;
            val = "";
            const item = db.find(i => i.id === id);
            document.getElementById('calc-title').innerText = item.name;
            document.getElementById('calc-val').innerText = "0";
            document.getElementById('calc-modal').classList.remove('hidden');
        }

        function n(k) {
            if(k === 'C') val = ""; else val += k;
            document.getElementById('calc-val').innerText = val || "0";
            const item = db.find(i => i.id === activeId);
            document.getElementById('alert-pill').classList.toggle('hidden', parseInt(val) <= item.prev);
        }

        function confirmPrice() {
            db.find(i => i.id === activeId).now = parseInt(val) || 0;
            document.getElementById('calc-modal').classList.add('hidden');
            render();
        }

        function closeCalc() { document.getElementById('calc-modal').classList.add('hidden'); }
        function nextStep() { if(currentStep < 5) currentStep++; render(); }
        function prevStep() { if(currentStep > 1) currentStep--; render(); }

        render();
    </script>
</body>
</html>
