<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Brain Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #F1F5F9; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .item-card { border-radius: 16px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .item-card:active { transform: scale(0.98); }
        .bought { background-color: #F8FAFC !important; border: 1px solid #E2E8F0 !important; }
        .bought h4 { color: #94A3B8; text-decoration: line-through; }
        .tab-active { color: #4F46E5; border-bottom: 3px solid #4F46E5; }
        input focus { outline: none; border-color: #4F46E5; }
        .add-btn-shadow { shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
    </style>
</head>
<body class="pb-24">

    <div class="glass-header sticky top-0 z-40 border-b border-slate-200">
        <div class="p-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Market<span class="text-indigo-600">Brain</span></h1>
                <p id="current-date" class="text-xs text-slate-500 uppercase tracking-wider"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="clearData()" class="p-2 text-slate-400 hover:text-red-500"><i class="fas fa-redo-alt"></i></button>
                <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </div>
        <div class="flex justify-around text-sm font-semibold text-slate-400">
            <button onclick="switchTab('buy')" id="tab-buy" class="pb-3 px-4 tab-active">รายการซื้อ</button>
            <button onclick="switchTab('stock')" id="tab-stock" class="pb-3 px-4">คลังสินค้า</button>
            <button onclick="switchTab('report')" id="tab-report" class="pb-3 px-4">สรุปผล</button>
        </div>
    </div>

    <div id="summary-section" class="p-4 flex gap-3 overflow-x-auto no-scrollbar">
        <div class="min-w-[140px] bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase">จ่ายจริงวันนี้</p>
            <p id="total-cost" class="text-lg font-bold text-slate-800">฿0.00</p>
        </div>
        <div class="min-w-[140px] bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase">จำนวนสินค้า</p>
            <p id="item-count" class="text-lg font-bold text-slate-800">0/0</p>
        </div>
    </div>

    <main class="px-4">
        <section id="section-buy" class="space-y-3">
            <div id="shopping-list" class="space-y-3">
                </div>
        </section>

        <section id="section-stock" class="hidden space-y-3">
            <div class="bg-indigo-50 p-4 rounded-xl text-indigo-700 text-sm mb-4">
                <i class="fas fa-info-circle mr-2"></i> จัดการสต็อกเพื่อคำนวณรายการซื้ออัตโนมัติ
            </div>
            <div id="stock-list" class="space-y-3"></div>
        </section>

        <section id="section-report" class="hidden">
            <div class="bg-white p-6 rounded-3xl shadow-sm text-center">
                <i class="fas fa-chart-pie text-4xl text-indigo-200 mb-4"></i>
                <h3 class="text-slate-800 font-bold">ยังไม่มีข้อมูลสรุป</h3>
                <p class="text-slate-400 text-sm">ซื้อของให้ครบเพื่อดูการวิเคราะห์ต้นทุน</p>
            </div>
        </section>
    </main>

    <button onclick="openModal()" class="fixed bottom-24 right-6 w-14 h-14 bg-indigo-600 text-white rounded-2xl shadow-lg flex items-center justify-center text-xl add-btn-shadow z-50">
        <i class="fas fa-plus"></i>
    </button>

    <div id="itemModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center z-[100]">
        <div class="bg-white w-full max-w-md rounded-t-[32px] sm:rounded-[32px] p-8 shadow-2xl transition-all">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6 sm:hidden"></div>
            <h3 class="text-xl font-bold text-slate-800 mb-6">เพิ่มรายการของสด</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase mb-1 block">ชื่อสินค้า</label>
                    <input type="text" id="itemName" placeholder="เช่น เนื้อวากิว, ผักชี" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-slate-800 focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="text-xs font-bold text-slate-400 uppercase mb-1 block">จำนวน</label>
                        <input type="number" id="itemQty" placeholder="0.00" class="w-full bg-slate-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="w-1/2">
                        <label class="text-xs font-bold text-slate-400 uppercase mb-1 block">หน่วย</label>
                        <select id="itemUnit" class="w-full bg-slate-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500">
                            <option value="กก.">กิโลกรัม (กก.)</option>
                            <option value="ชิ้น">ชิ้น</option>
                            <option value="ลูก">ลูก</option>
                            <option value="แผง">แผง</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal()" class="w-1/3 py-4 text-slate-400 font-bold">ยกเลิก</button>
                    <button onclick="addItem()" class="w-2/3 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200">บันทึกลงลิสต์</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-100 px-8 py-4 flex justify-between items-center z-40">
        <div class="flex flex-col items-center text-indigo-600">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">ตลาด</span>
        </div>
        <div class="flex flex-col items-center text-slate-300">
            <i class="fas fa-file-invoice-dollar text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">บัญชี</span>
        </div>
        <div class="flex flex-col items-center text-slate-300">
            <i class="fas fa-cog text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">ตั้งค่า</span>
        </div>
    </nav>

    <script>
        let items = JSON.parse(localStorage.getItem('mb_items')) || [];
        
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('th-TH', { day: 'numeric', month: 'long' });

        function switchTab(tab) {
            ['buy', 'stock', 'report'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        function openModal() { document.getElementById('itemModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('itemModal').classList.add('hidden'); }

        function addItem() {
            const name = document.getElementById('itemName').value;
            const qty = document.getElementById('itemQty').value;
            const unit = document.getElementById('itemUnit').value;

            if(name && qty) {
                items.push({
                    id: Date.now(),
                    name, qty, unit,
                    lastPrice: (Math.random() * 100 + 50).toFixed(0), // จำลองราคาเก่า
                    currentPrice: 0,
                    bought: false
                });
                saveData();
                closeModal();
                document.getElementById('itemName').value = '';
            }
        }

        function toggleItem(id) {
            items = items.map(item => item.id === id ? {...item, bought: !item.bought} : item);
            saveData();
        }

        function updatePrice(id, val) {
            items = items.map(item => item.id === id ? {...item, currentPrice: parseFloat(val) || 0} : item);
            renderStats();
        }

        function deleteItem(id) {
            if(confirm('ลบรายการนี้ใช่ไหม?')) {
                items = items.filter(item => item.id !== id);
                saveData();
            }
        }

        function clearData() {
            if(confirm('ล้างข้อมูลทั้งหมดเพื่อเริ่มวันใหม่?')) {
                items = [];
                saveData();
            }
        }

        function renderStats() {
            const total = items.reduce((sum, item) => sum + (item.bought ? (item.currentPrice * item.qty) : 0), 0);
            document.getElementById('total-cost').innerText = `฿${total.toLocaleString()}`;
            const boughtCount = items.filter(i => i.bought).length;
            document.getElementById('item-count').innerText = `${boughtCount}/${items.length}`;
        }

        function saveData() {
            localStorage.setItem('mb_items', JSON.stringify(items));
            renderList();
            renderStats();
        }

        function renderList() {
            const list = document.getElementById('shopping-list');
            list.innerHTML = items.length === 0 ? 
                `<div class="text-center py-10 text-slate-400 text-sm">ไม่มีรายการซื้อวันนี้<br>กดปุ่ม + เพื่อเริ่ม</div>` : '';
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = `item-card p-5 bg-white border border-slate-100 shadow-sm flex flex-col gap-4 ${item.bought ? 'bought' : ''}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div onclick="toggleItem(${item.id})" class="flex-1">
                            <h4 class="font-bold text-slate-800">${item.name}</h4>
                            <div class="flex gap-3 mt-1">
                                <span class="text-xs font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-md">${item.qty} ${item.unit}</span>
                                <span class="text-xs text-slate-400 italic">ราคาเดิม: ฿${item.lastPrice}</span>
                            </div>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="text-slate-300 hover:text-red-500 p-1"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex-1 bg-slate-50 rounded-xl px-4 py-2 flex items-center">
                            <span class="text-slate-400 mr-2 text-sm">฿</span>
                            <input type="number" oninput="updatePrice(${item.id}, this.value)" 
                                   value="${item.currentPrice || ''}"
                                   placeholder="ใส่ราคาต่อหน่วย" 
                                   class="bg-transparent w-full text-sm font-bold text-slate-700 outline-none">
                        </div>
                        <button onclick="toggleItem(${item.id})" 
                                class="w-12 h-12 rounded-xl flex items-center justify-center transition-all ${item.bought ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}">
                            <i class="fas ${item.bought ? 'fa-check' : 'fa-shopping-cart'}"></i>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // Initialize
        renderList();
        renderStats();
    </script>
</body>
</html>
